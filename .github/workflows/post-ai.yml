name: AI News Auto Post (ai)

on:
  schedule:
    # nyanko と同じ朝/昼/夜のタイミング (UTC 指定)
    # ※ GitHub Actions の :00/:30 ホットアワー回避のため :07 / :37 にずらしている
    - cron: '7 23 * * *'    # 朝 08:07 JST (前日 UTC)
    - cron: '37 3 * * *'    # 昼 12:37 JST
    - cron: '7 12 * * *'    # 夜 21:07 JST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not post to X)'
        required: false
        default: 'false'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install system fonts (Noto Sans CJK for Pillow)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run post (ai)
        env:
          ACCOUNT_NAME: ai
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY_AI }}
          X_API_SECRET: ${{ secrets.X_API_SECRET_AI }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN_AI }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET_AI }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python src/main.py --dry-run
          else
            python src/main.py
          fi
      - name: Commit log if updated
        if: success() && github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add logs/ai/posted.jsonl || true
          git diff --staged --quiet || git commit -m "chore: update ai posted log [skip ci]"
          git push || true
