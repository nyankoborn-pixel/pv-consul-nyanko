name: PV Consul Nyanko Auto Post (nyanko)

on:
  schedule:
    # 運用マニュアル v3 §8.1 のスケジュール (UTC 指定)
    - cron: '0 23 * * *'   # 朝 08:00 JST (前日 UTC)
    - cron: '30 3 * * *'   # 昼 12:30 JST
    - cron: '0 12 * * *'   # 夜 21:00 JST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not post to X)'
        required: false
        default: 'false'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install system fonts (Noto Sans CJK for Pillow)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run post (nyanko)
        env:
          ACCOUNT_NAME: nyanko
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python src/main.py --dry-run
          else
            python src/main.py
          fi
      - name: Commit log if updated
        if: success() && github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add logs/nyanko/posted.jsonl || true
          git diff --staged --quiet || git commit -m "chore: update nyanko posted log [skip ci]"
          git push || true
