title: "国外航行中のクルーズ船におけるハンタウイルス感染症事例について"
source_name: "JIHS リスク評価"
summary: |
  国立健康危機管理研究機構(JIHS)は2026年5月6日、南大西洋を航行中のクルーズ船においてハンタウイルス感染症の集団発生が報告されたことを受け、リスク評価を公表した。2026年5月2日に発生が確認され、5月4日時点で7例(確定例2例、疑い例5例)が報告され、うち3例が死亡している。当該船舶は南米・南極圏を航行後、現在アフリカ沖に停泊中で、カナリア諸島へ向かう予定。WHOおよびECDCも情報共有を開始している。ハンタウイルスはハンタウイルス科オルソハンタウイルス属のウイルスの総称で、ユーラシア大陸型は腎症候性出血熱を、米大陸型はハンタウイルス肺症候群を引き起こす。感染源となるげっ歯類は日本国内には生息しておらず、国内での自然感染サイクルは成立しない。ヒト-ヒト感染の可能性も限定的と評価されている。
